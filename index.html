<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Status: Critical</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #121212; 
            color: #00ffcc; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        h1 { font-size: 1.5rem; white-space: pre-line; margin-bottom: 20px; }
        .hidden { display: none; }
        #action-area {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        button { 
            background-color: #ff3366; 
            color: white; 
            border: none; 
            padding: 15px 30px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.3s;
        }
        button:hover { background-color: #cc0052; }
    </style>
</head>
<body>

    <h1 id="typing-text"></h1>
    
    <div id="action-area" class="hidden">
        <p>System analysis complete.<br>Conclusion: I am currently upset with you. 😏</p>
        <p>To initiate the forgiveness sequence, click the button below.</p>
        <button id="apology-btn" onmouseover="dodge()">I am deeply, deeply sorry</button>
    </div>

    <script>
        const text = "Initializing mood_diagnostic.exe... \nScanning recent interactions... \nAnalyzing texts... \nDetecting high levels of boyfriend neglect... \nStatus: Officially Upset. 😤";
        let i = 0;
        
        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 40); // Typing speed
            } else {
                setTimeout(() => {
                    document.getElementById("action-area").classList.remove("hidden");
                }, 1000);
            }
        }
        
        window.onload = typeWriter;

        // The prank function that moves the button
        function dodge() {
            const btn = document.getElementById("apology-btn");
            
            // Calculate random positions within the window boundaries
            const maxX = window.innerWidth - btn.clientWidth - 50;
            const maxY = window.innerHeight - btn.clientHeight - 50;
            
            const randomX = Math.max(20, Math.floor(Math.random() * maxX));
            const randomY = Math.max(20, Math.floor(Math.random() * maxY));
            
            btn.style.position = 'absolute';
            btn.style.left = `${randomX}px`;
            btn.style.top = `${randomY}px`;
        }
    </script>

</body>
</html>
